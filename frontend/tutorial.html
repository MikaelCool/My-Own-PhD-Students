<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Own PhD Students Tutorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="tutorial-page">
  <div class="tutorial-shell">
    <header class="tutorial-topbar">
      <div class="brand">
        <div class="brand-mark">MP</div>
        <div>
          <div class="brand-name">My Own PhD Students</div>
          <div class="brand-subtitle" data-i18n="tutorial_subtitle">Visual workspace tutorial</div>
        </div>
      </div>
      <div class="tutorial-actions">
        <div class="tutorial-language-switch" role="group" aria-label="Language switch">
          <button id="tutorial-lang-zh" class="secondary-action" type="button">中文</button>
          <button id="tutorial-lang-en" class="secondary-action" type="button">EN</button>
        </div>
        <a class="secondary-action sidebar-link" href="/" data-i18n="back_workspace">Back to Workspace</a>
      </div>
    </header>
    <div class="tutorial-layout">
      <aside class="tutorial-sidebar">
        <section class="tutorial-nav">
          <div class="eyebrow" data-i18n="tutorial_nav_title">Contents</div>
          <div class="tutorial-nav-links" id="tutorial-nav-links"></div>
        </section>
      </aside>
      <main class="tutorial-main">
        <section class="tutorial-hero">
          <div class="eyebrow" data-i18n="tutorial_eyebrow">Usage Tutorial</div>
          <h1 data-i18n="tutorial_title">How to use the visual workspace</h1>
          <p data-i18n="tutorial_intro">This page explains what each area does what to choose and what to fill in when you start a topic configure runtime and move work to a cloud server</p>
        </section>
        <div id="tutorial-content" class="tutorial-content"></div>
      </main>
    </div>
  </div>
  <script src="/static/tutorial.js"></script>
</body>
</html>
